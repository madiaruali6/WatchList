name: cine_vault
description: "CineVault — учебное приложение для отслеживания фильмов."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.6.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Сеть
  dio: ^5.7.0
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # Firebase
  firebase_core: ^3.8.0
  firebase_auth: ^5.3.3
  cloud_firestore: ^5.5.0

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  go_router: ^14.6.2
  stream_transform: ^2.1.1

  # Dependency Injection
  get_it: ^7.7.0

  # Local cache
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path: ^1.9.1
  path_provider: ^2.1.5

  # Модели / сериализация
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Локализация
  intl: any

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.22.1
  freezed: ^2.5.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true # включает генерацию локализации из .arb файлов
